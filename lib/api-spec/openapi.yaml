openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sales & Distributor Commission Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: clients
  - name: orders
  - name: commissions
  - name: dashboard
  - name: settings
  - name: packages
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /users:
    get:
      operationId: listUsers
      tags: [users]
      parameters:
        - name: role
          in: query
          required: false
          schema: { type: string, enum: [ADMIN, DISTRIBUTOR, SALES] }
        - name: distributorId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      responses:
        "200":
          description: Clients
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Client" }
    post:
      operationId: createClient
      tags: [clients]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateClientRequest" }
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }

  /clients/lookup:
    get:
      operationId: lookupClient
      tags: [clients]
      parameters:
        - name: taxCardNumber
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Client lookup result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClientLookupResult" }

  /clients/{id}:
    get:
      operationId: getClientProfile
      tags: [clients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Client Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client360Profile" }
        "404":
          description: Client not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      operationId: updateClient
      tags: [clients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateClientRequest" }
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
        "404":
          description: Client not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /clients/{id}/assignment:
    patch:
      operationId: reassignClient
      tags: [clients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReassignClientRequest" }
      responses:
        "200":
          description: Client reassigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Client not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /clients/{id}/assignments:
    get:
      operationId: listClientAssignments
      tags: [clients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Assignment history for client
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClientAssignment" }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Client not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      responses:
        "200":
          description: Packages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Package" }
    post:
      operationId: createPackage
      tags: [packages]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePackageRequest" }
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Package" }

  /packages/{id}:
    patch:
      operationId: updatePackage
      tags: [packages]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePackageRequest" }
      responses:
        "200":
          description: Package updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Package" }
        "404":
          description: Package not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    delete:
      operationId: deletePackage
      tags: [packages]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Package deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOrderRequest" }
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }

  /orders/unified:
    post:
      operationId: createUnifiedOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUnifiedOrderRequest" }
      responses:
        "201":
          description: Unified order created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnifiedOrderResponse" }

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrderStatusRequest" }
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }

  /commissions:
    get:
      operationId: listCommissions
      tags: [commissions]
      responses:
        "200":
          description: Commissions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Commission" }

  /commissions/{id}/status:
    patch:
      operationId: updateCommissionStatus
      tags: [commissions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCommissionStatusRequest" }
      responses:
        "200":
          description: Commission updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Commission" }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Commission not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /commissions/mark-paid:
    post:
      operationId: markCommissionsPaid
      tags: [commissions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MarkCommissionsPaidRequest" }
      responses:
        "200":
          description: Updated commissions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Commission" }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Summary for current user role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /settings/commission-rates:
    get:
      operationId: getCommissionRates
      tags: [settings]
      responses:
        "200":
          description: Current commission rates
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommissionRates" }
    put:
      operationId: updateCommissionRates
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommissionRates" }
      responses:
        "200":
          description: Updated rates
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommissionRates" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    Role:
      type: string
      enum: [ADMIN, DISTRIBUTOR, SALES]

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        distributorId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AuthSession:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }

    CreateUserRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        distributorId: { type: ["integer", "null"] }

    Client:
      type: object
      required: [
        id, name, taxCardNumber, taxCardName, issuingAuthority, 
        commercialRegistryNumber, businessType, email, phone1, 
        phone1WhatsApp, nationalId, address, assignedSalesId, 
        assignedDistributorId, ownershipStartDate, ownershipEndDate, createdAt
      ]
      properties:
        id: { type: integer }
        name: { type: string }
        taxCardNumber: { type: string }
        taxCardName: { type: string }
        issuingAuthority: { type: string }
        commercialRegistryNumber: { type: string }
        businessType: { type: string }
        email: { type: string }
        phone1: { type: string }
        phone1WhatsApp: { type: boolean }
        phone2: { type: ["string", "null"] }
        phone2WhatsApp: { type: boolean }
        nationalId: { type: string }
        address: { type: string }
        assignedSalesId: { type: integer }
        assignedDistributorId: { type: integer }
        ownershipStartDate: { type: string, format: date-time }
        ownershipEndDate: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    UpdateClientRequest:
      type: object
      properties:
        name: { type: string }
        taxCardNumber: { type: string }
        taxCardName: { type: string }
        issuingAuthority: { type: string }
        commercialRegistryNumber: { type: string }
        businessType: { type: string }
        email: { type: string }
        phone1: { type: string }
        phone1WhatsApp: { type: boolean }
        phone2: { type: ["string", "null"] }
        phone2WhatsApp: { type: boolean }
        nationalId: { type: string }
        address: { type: string }

    CreateClientRequest:
      type: object
      required: [
        name, taxCardNumber, taxCardName, issuingAuthority, 
        commercialRegistryNumber, businessType, email, phone1, 
        phone1WhatsApp, nationalId, address
      ]
      properties:
        name: { type: string }
        taxCardNumber: { type: string }
        taxCardName: { type: string }
        issuingAuthority: { type: string }
        commercialRegistryNumber: { type: string }
        businessType: { type: string }
        email: { type: string }
        phone1: { type: string }
        phone1WhatsApp: { type: boolean }
        phone2: { type: ["string", "null"] }
        phone2WhatsApp: { type: boolean }
        nationalId: { type: string }
        address: { type: string }
        assignedSalesId: { type: ["integer", "null"] }

    ClientLookupResult:
      type: object
      required: [found]
      properties:
        found: { type: boolean }
        client: { $ref: "#/components/schemas/Client" }
        hasPendingOrder: { type: boolean }

    Client360Profile:
      type: object
      required: [client, orders]
      properties:
        client: { $ref: "#/components/schemas/Client" }
        orders: 
          type: array
          items: { $ref: "#/components/schemas/Order" }

    ReassignClientRequest:
      type: object
      required: [assignedSalesId]
      properties:
        assignedSalesId: { type: integer }

    ClientAssignment:
      type: object
      required: [id, clientId, toSalesId, toDistributorId, changedById, createdAt]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        fromSalesId: { type: ["integer", "null"] }
        fromSalesName: { type: ["string", "null"] }
        fromDistributorId: { type: ["integer", "null"] }
        fromDistributorName: { type: ["string", "null"] }
        toSalesId: { type: integer }
        toSalesName: { type: ["string", "null"] }
        toDistributorId: { type: integer }
        toDistributorName: { type: ["string", "null"] }
        changedById: { type: integer }
        changedByName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    Package:
      type: object
      required: [id, name, price, vatPct, isActive, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        price: { type: number }
        vatPct: { type: number }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    CreatePackageRequest:
      type: object
      required: [name, price, vatPct]
      properties:
        name: { type: string }
        price: { type: number }
        vatPct: { type: number }

    UpdatePackageRequest:
      type: object
      properties:
        name: { type: string }
        price: { type: number }
        vatPct: { type: number }
        isActive: { type: boolean }

    OrderStatus:
      type: string
      enum: [PENDING, COMPLETED]

    Order:
      type: object
      required: [id, clientId, orderName, amount, vatAmount, isFullyCollected, orderDate, status, createdAt]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        clientName: { type: ["string", "null"] }
        packageId: { type: ["integer", "null"] }
        packageName: { type: ["string", "null"] }
        salesId: { type: ["integer", "null"] }
        salesName: { type: ["string", "null"] }
        distributorId: { type: ["integer", "null"] }
        distributorName: { type: ["string", "null"] }
        orderName: { type: string }
        amount: { type: number }
        vatAmount: { type: number }
        receiptNumber: { type: ["string", "null"] }
        isFullyCollected: { type: boolean }
        orderDate: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/OrderStatus" }
        createdAt: { type: string, format: date-time }

    CreateOrderRequest:
      type: object
      required: [clientId, packageId, isFullyCollected]
      properties:
        clientId: { type: integer }
        packageId: { type: integer }
        receiptNumber: { type: ["string", "null"] }
        isFullyCollected: { type: boolean }

    CreateUnifiedOrderRequest:
      type: object
      required: [taxCardNumber, packageId, isFullyCollected]
      properties:
        taxCardNumber: { type: string }
        client: { $ref: "#/components/schemas/CreateClientRequest" }
        packageId: { type: integer }
        receiptNumber: { type: ["string", "null"] }
        isFullyCollected: { type: boolean }

    UnifiedOrderResponse:
      type: object
      required: [client, order]
      properties:
        client: { $ref: "#/components/schemas/Client" }
        order: { $ref: "#/components/schemas/Order" }

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/OrderStatus" }

    CommissionStatus:
      type: string
      enum: [UNPAID, PAID]

    UpdateCommissionStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/CommissionStatus" }

    MarkCommissionsPaidRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: integer }

    Commission:
      type: object
      required: [id, orderId, userId, amount, roleType, status, createdAt]
      properties:
        id: { type: integer }
        orderId: { type: integer }
        orderName: { type: ["string", "null"] }
        clientName: { type: ["string", "null"] }
        userId: { type: integer }
        userName: { type: ["string", "null"] }
        amount: { type: number }
        roleType:
          type: string
          enum: [DISTRIBUTOR, SALES]
        status:
          type: string
          enum: [UNPAID, PAID]
        createdAt: { type: string, format: date-time }
        paidAt: { type: ["string", "null"], format: date-time }
        paidByUserId: { type: ["integer", "null"] }
        paidByName: { type: ["string", "null"] }

    DashboardSummary:
      type: object
      required: [role, totalOrders, completedOrders, pendingOrders, totalSales, totalCommissions, recentOrders, recentCommissions]
      properties:
        role: { $ref: "#/components/schemas/Role" }
        totalOrders: { type: integer }
        completedOrders: { type: integer }
        pendingOrders: { type: integer }
        totalSales: { type: number }
        totalCommissions: { type: number }
        teamSize: { type: ["integer", "null"] }
        clientCount: { type: ["integer", "null"] }
        recentOrders:
          type: array
          items: { $ref: "#/components/schemas/Order" }
        recentCommissions:
          type: array
          items: { $ref: "#/components/schemas/Commission" }

    CommissionRates:
      type: object
      required: [salesPct, distributorPct]
      properties:
        salesPct: { type: number }
        distributorPct: { type: number }
